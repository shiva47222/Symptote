<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;background:transparent;">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Symptote</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }
</style>
</head>

<body>
<canvas id="sym"></canvas>

<script>
const canvas = document.getElementById("sym");
const ctx = canvas.getContext("2d");

function resize(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize", resize);
resize();

/* ---------------- CORE CONSTANTS ---------------- */

const TOTAL_CASES = 50;
const N = 300;
const ts = Array.from({length:N+1}, (_,i)=>i/N);

let currentCase = Math.floor(Math.random()*TOTAL_CASES);

/* ---------------- 50 RADIAL AXES ---------------- */

const axes = Array.from({length:TOTAL_CASES}, (_,i)=>{
  const phi = Math.acos(1 - 2*(i+0.5)/TOTAL_CASES);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  return [
    Math.sin(phi)*Math.cos(theta),
    Math.sin(phi)*Math.sin(theta),
    Math.cos(phi)
  ];
});

/* ---------------- RANDOM ---------------- */

function seededRand(seed, idx){
  let x = Math.sin(seed*9301 + idx*49297 + 233)*93177;
  return x - Math.floor(x);
}

/* ---------------- ASYMPTOTES ---------------- */

function missAsymVal(ci, t){
  const s = (i)=>seededRand(ci+7,i);
  const type = Math.floor(s(0)*3);

  if(type===0)
    return 0.5 - 1.1/(1+Math.exp(-14*(t-(0.25+s(1)*0.25))));
  if(type===1)
    return (-0.15+s(2)*0.1) + (0.3+s(3)*0.2)*Math.exp(-5*t)*Math.sin(t*(15+s(4)*8));

  return (-0.35+s(5)*0.2) + (0.7+s(6)*0.4)*(t<0.45 ? t/0.45 : 1-(t-0.45)/0.55);
}

function meetAsym(t){
  return 0.18*Math.sin(t*Math.PI)*0.5 + 0.06*t - 0.04;
}

/* ---------------- PROJECT ---------------- */

let rotX=0.38, rotY=-0.55;

function rotate([x,y,z]){
  const cY=Math.cos(rotY), sY=Math.sin(rotY);
  const x1=x*cY+z*sY, z1=-x*sY+z*cY;

  const cX=Math.cos(rotX), sX=Math.sin(rotX);
  return [x1, y*cX-z1*sX, y*sX+z1*cX];
}

function project(pt){
  const [x,y,z]=rotate(pt);
  const sc=360, fov=840;
  const d=fov/(fov+z*sc*0.5+sc*0.8);
  return [innerWidth/2 + x*sc*d, innerHeight/2 - y*sc*d];
}

/* ---------------- EMBED IN AXIS ---------------- */

function embed(axis,t,y){
  return [
    axis[0]*t,
    axis[1]*t + y*0.6,
    axis[2]*t
  ];
}

/* ---------------- STAGE 3 ASYMPTOTIC RULES ---------------- */

function curveForCase(ci,isPink){
  const axis = axes[ci];
  const pts = [];

  const isMeet = ci===0;

  const STEP = 2; // performance optimization

  for(let i=0;i<=N;i+=STEP){
    const t = i/N;

    let asym = isMeet ? meetAsym(t) : missAsymVal(ci-1,t);

    const direction = isPink ? 1 : -1;
    const infinityScale = 18/(0.02+t);

    let base;

    if(isMeet){
      const decay = Math.pow(1-t,2.2);
      base = direction * infinityScale * decay;
    } else {
      const decay = Math.exp(-t*4.5);
      base = direction * infinityScale * decay;
    }

    const y = asym + base;

    pts.push(project(embed(axis,t,y)));
  }

  return pts;
}

/* ---------------- DRAW ---------------- */

function draw(){
  ctx.clearRect(0,0,innerWidth,innerHeight);

  for(let ci=0;ci<TOTAL_CASES;ci++){

    const p = curveForCase(ci,true);
    const b = curveForCase(ci,false);

    const fade = Math.exp(-Math.abs(ci-currentCase)*0.35);

    ctx.globalAlpha = ci===currentCase ? 1 : (0.02 + fade*0.08);

    ctx.strokeStyle = "#cc00aa";
    ctx.beginPath();
    p.forEach((pt,i)=>i?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));
    ctx.stroke();

    ctx.strokeStyle = "#0055cc";
    ctx.beginPath();
    b.forEach((pt,i)=>i?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));
    ctx.stroke();
  }

  /* meet marker */
  if(currentCase===0){
    const mid = curveForCase(0,true)[150];
    ctx.globalAlpha=1;
    ctx.fillStyle="purple";
    ctx.beginPath();
    ctx.arc(mid[0],mid[1],6,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="rgba(120,0,120,0.8)";
    ctx.font="16px -apple-system";
    ctx.fillText("They meet", mid[0]+10, mid[1]-10);
  }
}

/* ---------------- INERTIA SYSTEM (STAGE 4) ---------------- */

let dragging=false;
let lastX=0,lastY=0;
let velX=0,velY=0;

const damping = 0.92;
const sensitivity = 0.006;

function animate(){
  rotY += velX;
  rotX += velY;

  velX *= damping;
  velY *= damping;

  draw();
  requestAnimationFrame(animate);
}
animate();

/* ---------------- INPUT ---------------- */

canvas.addEventListener("mousedown",(e)=>{
  dragging=true;
  lastX=e.clientX;
  lastY=e.clientY;
});

window.addEventListener("mousemove",(e)=>{
  if(!dragging) return;

  const dx=e.clientX-lastX;
  const dy=e.clientY-lastY;

  velX += dx*sensitivity;
  velY += dy*sensitivity;

  lastX=e.clientX;
  lastY=e.clientY;
});

window.addEventListener("mouseup",()=>dragging=false);

canvas.addEventListener("touchstart",(e)=>{
  dragging=true;
  lastX=e.touches[0].clientX;
  lastY=e.touches[0].clientY;
},{passive:false});

window.addEventListener("touchmove",(e)=>{
  if(!dragging) return;

  const x=e.touches[0].clientX;
  const y=e.touches[0].clientY;

  const dx=x-lastX;
  const dy=y-lastY;

  velX += dx*sensitivity;
  velY += dy*sensitivity;

  lastX=x;
  lastY=y;
},{passive:false});

window.addEventListener("touchend",()=>dragging=false);

</script>
</body>
</html>
