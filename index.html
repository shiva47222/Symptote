<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Symptote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #fdf8f4; }
    @media (prefers-color-scheme: dark) { html, body { background: #111010; } }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px 16px; }
    canvas { display: block; width: 100%; max-width: 760px; }
    #controls {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #999;
      text-align: center;
      padding: 10px 0 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 760px;
    }
    @media (prefers-color-scheme: dark) { #controls { color: #666; } }
    #meetSlider { width: 260px; accent-color: #cc88ff; }
    #title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #bbb;
      text-transform: lowercase;
      margin-bottom: 20px;
    }
    @media (prefers-color-scheme: dark) { #title { color: #555; } }
  </style>
</head>
<body>
  <div id="title">symptote</div>
  <canvas id="c"></canvas>
  <div id="controls">
    <span>meeting point</span>
    <input type="range" id="meetSlider" min="0.25" max="0.92" step="0.01" value="0.65">
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 760, H = 460;
    canvas.width = W;
    canvas.height = H;

    const asymY = H / 2;
    const startX = 44;
    const k = 180;
    const offset = 10;
    let meetFrac = 0.65;

    function upperY(x) {
      const t = x - startX;
      if (t <= 0) return asymY - k - offset;
      return asymY - (k / (1 + t * 0.040)) - offset;
    }
    function lowerY(x) {
      const t = x - startX;
      if (t <= 0) return asymY + k + offset;
      return asymY + (k / (1 + t * 0.040)) + offset;
    }

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function lerpHex(c1, c2, t) {
      const a = hexToRgb(c1), b = hexToRgb(c2);
      return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
    }
    function lerpRgb(a, b, t) {
      return [
        Math.round(a[0]+(b[0]-a[0])*t),
        Math.round(a[1]+(b[1]-a[1])*t),
        Math.round(a[2]+(b[2]-a[2])*t)
      ];
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const meetX = Math.round(meetFrac * W);

      // Neon line colours
      const col1 = isDark ? '#ff1aff' : '#ee00cc';   // neon magenta
      const col2 = isDark ? '#00ffaa' : '#00dd88';   // neon green-mint
      const colMix = lerpHex(col1, col2, 0.5);        // neon cyan-purple mix

      // Pastel background colours
      const upper = isDark ? [120, 60, 140] : [240, 200, 255];   // pastel lavender/violet
      const lower = isDark ? [40, 120, 100] : [190, 255, 225];   // pastel mint/seafoam
      const mixed = lerpRgb(upper, lower, 0.5);
      const wa = isDark ? 0.35 : 0.60;

      const axisCol  = isDark ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.09)';
      const asymCol  = isDark ? 'rgba(255,255,255,0.20)' : 'rgba(100,0,120,0.20)';
      const labelCol = isDark ? 'rgba(255,255,255,0.30)' : 'rgba(0,0,0,0.28)';

      // Pre-meeting worlds
      ctx.fillStyle = `rgba(${upper[0]},${upper[1]},${upper[2]},${wa})`;
      ctx.fillRect(0, 0, meetX, asymY);
      ctx.fillStyle = `rgba(${lower[0]},${lower[1]},${lower[2]},${wa})`;
      ctx.fillRect(0, asymY, meetX, H - asymY);

      // Post-meeting: immediately mixed
      ctx.fillStyle = `rgba(${mixed[0]},${mixed[1]},${mixed[2]},${wa})`;
      ctx.fillRect(meetX, 0, W - meetX, H);

      // Asymptote dashed (pre-meeting only)
      ctx.save();
      ctx.setLineDash([5, 9]);
      ctx.strokeStyle = asymCol;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(startX, asymY);
      ctx.lineTo(meetX, asymY);
      ctx.stroke();
      ctx.restore();

      // Upper curve — neon magenta
      ctx.save();
      ctx.strokeStyle = col1;
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let x = startX; x <= meetX; x++) {
        const y = upperY(x);
        x === startX ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineTo(meetX, asymY);
      ctx.stroke();
      ctx.restore();

      // Lower curve — neon mint
      ctx.save();
      ctx.strokeStyle = col2;
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let x = startX; x <= meetX; x++) {
        const y = lowerY(x);
        x === startX ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineTo(meetX, asymY);
      ctx.stroke();
      ctx.restore();

      // Merged line — neon mix
      ctx.save();
      ctx.strokeStyle = colMix;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(meetX, asymY);
      ctx.lineTo(W - 20, asymY);
      ctx.stroke();
      ctx.restore();

      // Meeting point dot
      ctx.beginPath();
      ctx.arc(meetX, asymY, 5, 0, Math.PI * 2);
      ctx.fillStyle = colMix;
      ctx.fill();

      // Birth marker
      ctx.save();
      ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.14)' : 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(startX, 20);
      ctx.lineTo(startX, H - 30);
      ctx.stroke();
      ctx.restore();

      // Axes
      ctx.save();
      ctx.strokeStyle = axisCol;
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(28, 20); ctx.lineTo(28, H - 28); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(20, H - 28); ctx.lineTo(W - 16, H - 28); ctx.stroke();
      ctx.restore();

      // Labels
      ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle = labelCol;
      ctx.textAlign = 'left';
      ctx.fillText('distance', 34, 22);
      ctx.fillText('↑', 32, 36);
      ctx.textAlign = 'center';
      ctx.fillText('t = 0', startX, H - 14);
      ctx.fillText('(birth)', startX, H - 3);

      ctx.fillStyle = isDark ? 'rgba(255,100,255,0.65)' : 'rgba(180,0,180,0.45)';
      ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('they meet', meetX, asymY - 13);
    }

    document.getElementById('meetSlider').addEventListener('input', e => {
      meetFrac = parseFloat(e.target.value);
      draw();
    });

    let dragging = false;
    canvas.addEventListener('mousedown', () => { dragging = true; });
    canvas.addEventListener('mousemove', e => {
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const x = (e.clientX - rect.left) * scaleX;
      meetFrac = Math.max(0.25, Math.min(0.92, x / W));
      document.getElementById('meetSlider').value = meetFrac;
      draw();
    });
    canvas.addEventListener('mouseup', () => { dragging = false; });
    canvas.addEventListener('mouseleave', () => { dragging = false; });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const x = (e.touches[0].clientX - rect.left) * scaleX;
      meetFrac = Math.max(0.25, Math.min(0.92, x / W));
      document.getElementById('meetSlider').value = meetFrac;
      draw();
    }, { passive: false });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);
    draw();
  </script>
</body>
</html>
