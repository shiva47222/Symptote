<!DOCTYPE html>
<html lang="en" style="background: transparent; margin: 0; padding: 0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Symptote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .sw {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 0;
      gap: 0;
    }
    canvas#sym {
      display: block;
      width: 100%;
      max-width: 1440px;
      touch-action: none;
    }
    .hint { font-size: 11px; color: #aaa; }
  </style>
</head>
<body>

<div class="sw">
  <canvas id="sym"></canvas>
</div>

<script>
const canvas = document.getElementById('sym');
const ctx = canvas.getContext('2d');
const W = 1440, H = 1000;
canvas.width = W; canvas.height = H;

function lerpHex(c1,c2,t){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const a=p(c1),b=p(c2);
  return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
}

const c1 = () => '#cc00aa';
const c2 = () => '#0055cc';
const bgU = () => [240, 200, 255];
const bgL = () => [190, 215, 255];
function bgMix(){ const u=bgU(),l=bgL(); return [(u[0]+l[0])>>1,(u[1]+l[1])>>1,(u[2]+l[2])>>1]; }

const N = 300, meetFrac = 0.63;
const ts = Array.from({length: N+1}, (_,i) => i/N);

function seededRand(seed, idx){
  let x = Math.sin(seed*9301 + idx*49297 + 233)*93177;
  return x - Math.floor(x);
}

// Per-click random seeds for active case and each ghost
let clickSeeds = []; // clickSeeds[0..48] = ghost seeds; clickSeeds[49] = active case seed
let isMeetCase = false;

function newClickSeeds(){
  clickSeeds = Array.from({length: 50}, () => Math.random() * 99991);
  isMeetCase = Math.random() < (1/50);
}
newClickSeeds();

function caseFluctuation(seedVal, personIdx){
  return {
    agency: 0.15 + seededRand(seedVal + personIdx*31, 0) * 0.45,
    circum:  0.10 + seededRand(seedVal + personIdx*31, 1) * 0.35
  };
}

function agencyDistortion(t, strength, personSeed){
  if(strength < 0.001) return 0;
  let d = 0;
  const sharpness = 28;
  for(let i=0; i<4; i++){
    const knotPos = 0.1 + seededRand(personSeed, i*3)*0.8;
    const sign = seededRand(personSeed, i*3+1) > 0.5 ? 1 : -1;
    const mag = 0.3 + seededRand(personSeed, i*3+2)*0.2;
    const sig = 1/(1+Math.exp(-sharpness*(t-knotPos)));
    d += sign * strength * mag * (sig - 0.5);
  }
  return d;
}

function circumDistortion(t, strength, personSeed){
  if(strength < 0.001) return 0;
  let d = 0;
  for(let i=0; i<3; i++){
    const freq = 3 + seededRand(personSeed, 100+i*3)*8;
    const phase = seededRand(personSeed, 100+i*3+1)*Math.PI*2;
    const sign = seededRand(personSeed, 100+i*3+2) > 0.5 ? 1 : -1;
    const amp = 0.15 + seededRand(personSeed, 100+i*3+1)*0.1;
    d += sign * Math.sin(t*freq*Math.PI + phase) * strength * amp;
  }
  return d;
}

function meetAsym(t){ return 0.18*Math.sin(t*Math.PI)*0.5 + 0.06*t - 0.04; }

// Pink starts at +1 (top), converges to asymptote
function baseMeetPink(t){
  const a = meetAsym(t);
  const k = 7;
  // At t=0: value = 1. Decays toward asymptote a.
  return a + (1 - meetAsym(0)) * Math.exp(-k * t);
}

// Blue starts at -1 (bottom), converges to asymptote
function baseMeetBlue(t){
  const a = meetAsym(t);
  const k = 7;
  // At t=0: value = -1. Rises toward asymptote a.
  return a + (-1 - meetAsym(0)) * Math.exp(-k * t);
}

function applyDist(baseVal, asymVal, t, agency, circum, agSeed, cirSeed, side){
  const da = agencyDistortion(t, agency, agSeed) * side;
  const dc = circumDistortion(t, circum, cirSeed);
  const gap = baseVal - asymVal;
  const distorted = gap + da + dc;
  const clamped = side > 0 ? Math.max(0.02, distorted) : Math.min(-0.02, distorted);
  return Math.max(-1, Math.min(1, asymVal + clamped));
}

function missAsymVal(seed, t){
  const s = (idx) => seededRand(seed+7, idx);
  const type = Math.floor(s(0)*3);
  if(type===0) return 0.5 - 1.1/(1+Math.exp(-14*(t-(0.25+s(1)*0.25))));
  if(type===1) return (-0.15+s(2)*0.1) + (0.3+s(3)*0.2)*Math.exp(-5*t)*Math.sin(t*(15+s(4)*8));
  return (-0.35+s(5)*0.2) + (0.7+s(6)*0.4)*(t<0.45 ? t/0.45 : 1-(t-0.45)/0.55);
}

// Miss pink starts at +1, miss blue starts at -1
function baseMissPink(seed, t){
  const a = missAsymVal(seed, t);
  const k = 7 + seededRand(seed+3, 0) * 6;
  return a + (1 - missAsymVal(seed, 0)) * Math.exp(-k * t);
}
function baseMissBlue(seed, t){
  const a = missAsymVal(seed, t);
  const k = 7 + seededRand(seed+3, 1) * 6;
  return a + (-1 - missAsymVal(seed, 0)) * Math.exp(-k * t);
}

function missAngle(seed){ return Math.PI/2 + seededRand(seed+11,0)*Math.PI*0.9; }
function missPlane(seed,t,v){ const th=missAngle(seed); return [t, v*Math.sin(th), v*Math.cos(th)]; }

function nextCase(){ newClickSeeds(); }


let rotX=0.38, rotY=-0.55;
let dragging=false, dragMoved=false, lastMX=0, lastMY=0, downMX=0, downMY=0;
const cx=W/2, cy=H/2+10, fov=840;

function rotate([x,y,z]){
  const cY=Math.cos(rotY), sY=Math.sin(rotY);
  const x1=x*cY+z*sY, z1=-x*sY+z*cY;
  const cX=Math.cos(rotX), sX=Math.sin(rotX);
  return [x1, y*cX-z1*sX, y*sX+z1*cX];
}
function project(pt){
  const [x,y,z]=rotate(pt);
  const sc=360, d=fov/(fov+z*sc*0.5+sc*0.8);
  return [cx+x*sc*d, cy-y*sc*d];
}
function projectAll(pts){ return pts.map(p=>project(p)); }

function polyline(pts, style, w, alpha=1, dash=[]){
  if(alpha<=0 || pts.length<2) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = style;
  ctx.lineWidth = w;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash(dash);
  ctx.beginPath();
  pts.forEach(([sx,sy],i) => i===0 ? ctx.moveTo(sx,sy) : ctx.lineTo(sx,sy));
  ctx.stroke();
  ctx.restore();
}
function fillQuad(p0,p1,p2,p3, r,g,b, alpha){
  if(alpha<=0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.beginPath();
  ctx.moveTo(p0[0],p0[1]); ctx.lineTo(p1[0],p1[1]);
  ctx.lineTo(p2[0],p2[1]); ctx.lineTo(p3[0],p3[1]);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  const labelCol = 'rgba(0,0,0,0.28)';
  const axisCol  = 'rgba(0,0,0,0.18)';
  const wa    = 0.48;
  const ghost = 0.09;
  const bgSteps = 60;
  const mIdx = Math.round(meetFrac*N);
  const isMeet = isMeetCase;
  const activeSeed = clickSeeds[49];

  const [uR,uG,uB] = bgU();
  const [lR,lG,lB] = bgL();
  const [mR,mG,mB] = bgMix();

  const f1 = caseFluctuation(activeSeed, 0);
  const f2 = caseFluctuation(activeSeed, 1);

  if(isMeet){
    for(let i=0; i<bgSteps; i++){
      const i0=Math.floor(i/bgSteps*N), i1=Math.min(Math.floor((i+1)/bgSteps*N),N);
      const top0=project([ts[i0],1,0]), top1=project([ts[i1],1,0]);
      const bot0=project([ts[i0],-1,0]), bot1=project([ts[i1],-1,0]);
      if(i0<=mIdx){
        const a0=project([ts[i0],meetAsym(ts[i0]),0]), a1=project([ts[i1],meetAsym(ts[i1]),0]);
        fillQuad(top0,top1,a1,a0, uR,uG,uB, wa);
        fillQuad(a0,a1,bot1,bot0, lR,lG,lB, wa);
      } else {
        fillQuad(top0,top1,bot1,bot0, mR,mG,mB, wa);
      }
    }
  } else {
    for(let i=0; i<bgSteps; i++){
      const i0=Math.floor(i/bgSteps*N), i1=Math.min(Math.floor((i+1)/bgSteps*N),N);
      const av0=missAsymVal(activeSeed,ts[i0]), av1=missAsymVal(activeSeed,ts[i1]);
      const top0=project(missPlane(activeSeed,ts[i0],1)), top1=project(missPlane(activeSeed,ts[i1],1));
      const bot0=project(missPlane(activeSeed,ts[i0],-1)), bot1=project(missPlane(activeSeed,ts[i1],-1));
      const a0=project(missPlane(activeSeed,ts[i0],av0)), a1=project(missPlane(activeSeed,ts[i1],av1));
      fillQuad(top0,top1,a1,a0, uR,uG,uB, wa);
      fillQuad(a0,a1,bot1,bot0, lR,lG,lB, wa);
    }
  }

  // Time axis
  const origin=project([0,0,0]), axX=project([1.12,0,0]);
  ctx.save(); ctx.strokeStyle=axisCol; ctx.lineWidth=1; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(origin[0],origin[1]); ctx.lineTo(axX[0],axX[1]); ctx.stroke(); ctx.restore();
  ctx.font='22px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.fillStyle=labelCol; ctx.textAlign='center';
  ctx.fillText('Time', axX[0]+36, axX[1]+8);
  ctx.fillText('t = 0', origin[0]-44, origin[1]+8);

  const mf1 = caseFluctuation(activeSeed, 0), mf2 = caseFluctuation(activeSeed, 1);
  const p1AgS=activeSeed+1, p1CiS=activeSeed+2, p2AgS=activeSeed+3, p2CiS=activeSeed+4;
  const meetPinkPts = ts.map(t=>{
    const base=baseMeetPink(t), asym=meetAsym(t);
    if(t>meetFrac) return [t,asym,0];
    if(t===0) return [t,1,0];
    return [t, applyDist(base,asym,t,mf1.agency,mf1.circum,p1AgS,p1CiS,+1), 0];
  });
  const meetBluePts = ts.map(t=>{
    const base=baseMeetBlue(t), asym=meetAsym(t);
    if(t>meetFrac) return [t,asym,0];
    if(t===0) return [t,-1,0];
    return [t, applyDist(base,asym,t,mf2.agency,mf2.circum,p2AgS,p2CiS,-1), 0];
  });
  const meetAsymPts = ts.map(t=>[t,meetAsym(t),0]);
  const mergedPts = meetAsymPts.slice(mIdx);
  const colMix = lerpHex(c1(), c2(), 0.5);
  const asymMeetCol = 'rgba(140,0,140,0.35)';

  if(isMeet){
    for(let gi=0; gi<49; gi++){
      const gs = clickSeeds[gi];
      const gf1=caseFluctuation(gs,0), gf2=caseFluctuation(gs,1);
      const s1=gs+1, s2=gs+2, s3=gs+3, s4=gs+4;
      const mpPts = ts.map(t=>{ if(t===0) return missPlane(gs,0,1); const base=baseMissPink(gs,t),asym=missAsymVal(gs,t); return missPlane(gs,t,applyDist(base,asym,t,gf1.agency,gf1.circum,s1,s2,+1)); });
      const mbPts = ts.map(t=>{ if(t===0) return missPlane(gs,0,-1); const base=baseMissBlue(gs,t),asym=missAsymVal(gs,t); return missPlane(gs,t,applyDist(base,asym,t,gf2.agency,gf2.circum,s3,s4,-1)); });
      polyline(projectAll(mpPts), c1(), 1.5, ghost);
      polyline(projectAll(mbPts), c2(), 1.5, ghost);
    }
    const meetPinkPre = meetPinkPts.slice(0,mIdx+1).concat([[meetFrac,meetAsym(meetFrac),0]]);
    const meetBluePre = meetBluePts.slice(0,mIdx+1).concat([[meetFrac,meetAsym(meetFrac),0]]);
    polyline(projectAll(meetAsymPts.slice(0,mIdx+1)), asymMeetCol, 2, 1, [5,9]);
    polyline(projectAll(meetPinkPre), c1(), 4, 1);
    polyline(projectAll(meetBluePre), c2(), 4, 1);
    polyline(projectAll(mergedPts), colMix, 5, 1);
    const dot = project([meetFrac, meetAsym(meetFrac), 0]);
    ctx.beginPath(); ctx.arc(dot[0],dot[1],9,0,Math.PI*2);
    ctx.fillStyle=colMix; ctx.fill();
    ctx.save(); ctx.globalAlpha=0.7;
    ctx.fillStyle='rgba(160,0,160,0.65)';
    ctx.font='20px -apple-system,BlinkMacSystemFont,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('They meet', dot[0], dot[1]-22);
    ctx.restore();
  } else {
    const meetPinkPre = meetPinkPts.slice(0,mIdx+1).concat([[meetFrac,meetAsym(meetFrac),0]]);
    const meetBluePre = meetBluePts.slice(0,mIdx+1).concat([[meetFrac,meetAsym(meetFrac),0]]);
    polyline(projectAll(meetPinkPre), c1(), 1.5, ghost);
    polyline(projectAll(meetBluePre), c2(), 1.5, ghost);
    polyline(projectAll(mergedPts), colMix, 1.5, ghost);
    for(let gi=0; gi<49; gi++){
      const gs = clickSeeds[gi];
      const gf1=caseFluctuation(gs,0), gf2=caseFluctuation(gs,1);
      const s1=gs+1, s2=gs+2, s3=gs+3, s4=gs+4;
      const mpPts = ts.map(t=>{ if(t===0) return missPlane(gs,0,1); const base=baseMissPink(gs,t),asym=missAsymVal(gs,t); return missPlane(gs,t,applyDist(base,asym,t,gf1.agency,gf1.circum,s1,s2,+1)); });
      const mbPts = ts.map(t=>{ if(t===0) return missPlane(gs,0,-1); const base=baseMissBlue(gs,t),asym=missAsymVal(gs,t); return missPlane(gs,t,applyDist(base,asym,t,gf2.agency,gf2.circum,s3,s4,-1)); });
      polyline(projectAll(mpPts), c1(), 1.5, ghost);
      polyline(projectAll(mbPts), c2(), 1.5, ghost);
    }
    const asymMissCol = 'rgba(0,80,200,0.35)';
    const asymMissPts = ts.map(t=>missPlane(activeSeed,t,missAsymVal(activeSeed,t)));
    const s1=activeSeed+1, s2=activeSeed+2, s3=activeSeed+3, s4=activeSeed+4;
    const activePinkPts = ts.map(t=>{ if(t===0) return missPlane(activeSeed,0,1); const base=baseMissPink(activeSeed,t),asym=missAsymVal(activeSeed,t); return missPlane(activeSeed,t,applyDist(base,asym,t,f1.agency,f1.circum,s1,s2,+1)); });
    const activeBluePts = ts.map(t=>{ if(t===0) return missPlane(activeSeed,0,-1); const base=baseMissBlue(activeSeed,t),asym=missAsymVal(activeSeed,t); return missPlane(activeSeed,t,applyDist(base,asym,t,f2.agency,f2.circum,s3,s4,-1)); });
    polyline(projectAll(asymMissPts), asymMissCol, 2, 1, [5,9]);
    polyline(projectAll(activePinkPts), c1(), 4, 1);
    polyline(projectAll(activeBluePts), c2(), 4, 1);
  }
}

canvas.addEventListener('mousedown', e=>{
  dragging=true; dragMoved=false;
  downMX=e.clientX; downMY=e.clientY;
  lastMX=e.clientX; lastMY=e.clientY;
  canvas.style.cursor='grabbing';
});
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  if(Math.abs(e.clientX-downMX)>4 || Math.abs(e.clientY-downMY)>4) dragMoved=true;
  rotY += (e.clientX-lastMX)*0.008;
  rotX += (e.clientY-lastMY)*0.008;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastMX=e.clientX; lastMY=e.clientY;
  draw();
});
window.addEventListener('mouseup', ()=>{
  if(dragging && !dragMoved){ nextCase(); draw(); }
  dragging=false;
  canvas.style.cursor='default';
});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  dragging=true; dragMoved=false;
  lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  downMX=lastMX; downMY=lastMY;
}, {passive:false});
window.addEventListener('touchmove', e=>{
  if(!dragging) return;
  e.preventDefault();
  if(Math.abs(e.touches[0].clientX-downMX)>6 || Math.abs(e.touches[0].clientY-downMY)>6) dragMoved=true;
  rotY += (e.touches[0].clientX-lastMX)*0.008;
  rotX += (e.touches[0].clientY-lastMY)*0.008;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  draw();
}, {passive:false});
window.addEventListener('touchend', ()=>{
  if(dragging && !dragMoved){ nextCase(); draw(); }
  dragging=false;
});

draw();
</script>

</body>
</html>
