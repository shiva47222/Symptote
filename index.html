
<style>
  .sw{display:flex;flex-direction:column;align-items:center;padding:1.5rem 0 1rem;gap:14px;}
  .st{font-size:13px;letter-spacing:0.12em;color:var(--color-text-tertiary);font-family:var(--font-sans);}
  canvas#sym{display:block;width:100%;max-width:720px;cursor:grab;}
  canvas#sym:active{cursor:grabbing;}
  .sb{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .sbtn{font-family:var(--font-sans);font-size:12px;letter-spacing:0.04em;padding:6px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s;}
  .sbtn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);}
  .hint{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-sans);}
</style>
<div class="sw">
  <div class="st">Symptote</div>
  <canvas id="sym"></canvas>
  <div class="sb">
    <button class="sbtn active" id="btn-meet">They Meet</button>
    <button class="sbtn" id="btn-miss1">They Don't Meet</button>
    <button class="sbtn" id="btn-miss2">They Don't Meet Either</button>
  </div>
  <div class="hint">Drag to rotate</div>
</div>
<script>
const canvas = document.getElementById('sym');
const ctx = canvas.getContext('2d');
const W = 720, H = 520;
canvas.width = W; canvas.height = H;

const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

function lerpHex(c1,c2,t){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const a=p(c1),b=p(c2);
  return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
}

const c1=()=>isDark()?'#ff66ff':'#cc00aa';
const c2=()=>isDark()?'#44aaff':'#0055cc';
const bgU=a=>isDark()?`rgba(120,50,140,${a})`:`rgba(240,200,255,${a})`;
const bgL=a=>isDark()?`rgba(30,70,140,${a})`:`rgba(190,215,255,${a})`;
function bgMix(a){
  const u=isDark()?[120,50,140]:[240,200,255],l=isDark()?[30,70,140]:[190,215,255];
  return `rgba(${(u[0]+l[0])>>1},${(u[1]+l[1])>>1},${(u[2]+l[2])>>1},${a})`;
}

const N=300;
const meetFrac=0.63;
const ts=Array.from({length:N+1},(_,i)=>i/N);

// x-y plane: they meet
function meetAsym(t){ return 0.04*t; }
function pinkMeet(t){ const a=meetAsym(t); return a+(1-a)/(1+t*12); }
function blueMeet(t){ const a=meetAsym(t); return a+(-1-a)/(1+t*12); }

// x-z plane: they don't meet (possibility 1)
// The third axis is at angle in the x-z plane — 90deg from y
function missAsym1(t){ return -0.12+0.03*t; }
function pinkMiss1(t){ const a=missAsym1(t); return a+(1-a)/(1+t*8); }
function blueMiss1(t){ const a=missAsym1(t); return a+(-1-a)/(1+t*8); }

// Third plane: rotated 45deg between y and z (w-axis = y*sin45 + z*cos45)
// We represent this as a plane whose normal is perpendicular to x and to (0,1,1)/sqrt2
// Points in this plane: [t, v*sin45, v*cos45] where v is the "distance" coordinate
// Different asymptote — tighter approach, slightly different slope
function missAsym2(t){ return 0.08-0.02*t; }
function pinkMiss2(t){ const a=missAsym2(t); return a+(1-a)/(1+t*10); }
function blueMiss2(t){ const a=missAsym2(t); return a+(-1-a)/(1+t*10); }
const s45=Math.sin(Math.PI/4), c45=Math.cos(Math.PI/4);
// map scalar v on third axis to [x,y,z]
function plane3pt(t,v){ return [t, v*s45, v*c45]; }
function plane3asym(t){ return plane3pt(t, missAsym2(t)); }

// Precompute
const meetPink3D  = ts.map(t=>[t,pinkMeet(t),0]);
const meetBlue3D  = ts.map(t=>[t,blueMeet(t),0]);
const miss1Pink3D = ts.map(t=>[t,0,pinkMiss1(t)]);
const miss1Blue3D = ts.map(t=>[t,0,blueMiss1(t)]);
const miss2Pink3D = ts.map(t=>plane3pt(t,pinkMiss2(t)));
const miss2Blue3D = ts.map(t=>plane3pt(t,blueMiss2(t)));
const meetAsymPts  = ts.map(t=>[t,meetAsym(t),0]);
const miss1AsymPts = ts.map(t=>[t,0,missAsym1(t)]);
const miss2AsymPts = ts.map(t=>plane3asym(t));

let rotX=0.38, rotY=-0.55;
let dragging=false, lastMX=0, lastMY=0;
let active='meet';

const cx=W/2, cy=H/2+20, fov=420;

function rotate([x,y,z]){
  const cY=Math.cos(rotY),sY=Math.sin(rotY);
  const x1=x*cY+z*sY,z1=-x*sY+z*cY;
  const cX=Math.cos(rotX),sX=Math.sin(rotX);
  const y2=y*cX-z1*sX,z2=y*sX+z1*cX;
  return [x1,y2,z2];
}
function project(pt){
  const [x,y,z]=rotate(pt);
  const scale=180;
  const depth=fov/(fov+z*scale*0.5+scale*0.8);
  return [cx+x*scale*depth, cy-y*scale*depth, z];
}
function projectAll(pts){ return pts.map(p=>project(p)); }

function polyline(pts2d,style,width,alpha=1,dash=[]){
  if(alpha<=0) return;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.strokeStyle=style;
  ctx.lineWidth=width;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.setLineDash(dash);
  ctx.beginPath();
  pts2d.forEach(([sx,sy],i)=>i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy));
  ctx.stroke();
  ctx.restore();
}
function fillQuad(p0,p1,p2,p3,style,alpha){
  if(alpha<=0) return;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle=style;
  ctx.beginPath();
  ctx.moveTo(p0[0],p0[1]);ctx.lineTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.lineTo(p3[0],p3[1]);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const dark=isDark();
  const labelCol=dark?'rgba(255,255,255,0.30)':'rgba(0,0,0,0.28)';
  const axisCol=dark?'rgba(255,255,255,0.22)':'rgba(0,0,0,0.18)';
  const wa=dark?0.26:0.48;
  const ghostCurve=0.13;
  const ghostBg=ghostCurve*0.55;
  const bgSteps=60;
  const mIdx=Math.round(meetFrac*N);

  const isMeet=active==='meet';
  const isMiss1=active==='miss1';
  const isMiss2=active==='miss2';

  // Background fills
  // x-y plane (meet)
  {
    const pa=isMeet?wa:ghostBg;
    for(let i=0;i<bgSteps;i++){
      const i0=Math.floor(i/bgSteps*N),i1=Math.floor((i+1)/bgSteps*N);
      const t0=ts[i0],t1=ts[Math.min(i1,N)];
      const top0=project([t0,1,0]),top1=project([t1,1,0]);
      const bot0=project([t0,-1,0]),bot1=project([t1,-1,0]);
      if(i0<=mIdx){
        const a0=project([t0,meetAsym(t0),0]),a1=project([t1,meetAsym(t1),0]);
        fillQuad(top0,top1,a1,a0,bgU(1),pa);
        fillQuad(a0,a1,bot1,bot0,bgL(1),pa);
      } else {
        fillQuad(top0,top1,bot1,bot0,bgMix(1),pa);
      }
    }
  }
  // x-z plane (miss1)
  {
    const pa=isMiss1?wa:ghostBg;
    for(let i=0;i<bgSteps;i++){
      const i0=Math.floor(i/bgSteps*N),i1=Math.floor((i+1)/bgSteps*N);
      const t0=ts[i0],t1=ts[Math.min(i1,N)];
      const top0=project([t0,0,1]),top1=project([t1,0,1]);
      const bot0=project([t0,0,-1]),bot1=project([t1,0,-1]);
      const a0=project([t0,0,missAsym1(t0)]),a1=project([t1,0,missAsym1(t1)]);
      fillQuad(top0,top1,a1,a0,bgU(1),pa);
      fillQuad(a0,a1,bot1,bot0,bgL(1),pa);
    }
  }
  // diagonal plane (miss2) — at 45deg between y and z
  {
    const pa=isMiss2?wa:ghostBg;
    for(let i=0;i<bgSteps;i++){
      const i0=Math.floor(i/bgSteps*N),i1=Math.floor((i+1)/bgSteps*N);
      const t0=ts[i0],t1=ts[Math.min(i1,N)];
      const top0=project(plane3pt(t0,1)),top1=project(plane3pt(t1,1));
      const bot0=project(plane3pt(t0,-1)),bot1=project(plane3pt(t1,-1));
      const a0=project(plane3asym(t0)),a1=project(plane3asym(t1));
      fillQuad(top0,top1,a1,a0,bgU(1),pa);
      fillQuad(a0,a1,bot1,bot0,bgL(1),pa);
    }
  }

  // x-axis only
  const origin=project([0,0,0]);
  const axX=project([1.12,0,0]);
  ctx.save();
  ctx.strokeStyle=axisCol; ctx.lineWidth=1; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(origin[0],origin[1]); ctx.lineTo(axX[0],axX[1]); ctx.stroke();
  ctx.restore();
  ctx.font='11px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.fillStyle=labelCol;
  ctx.textAlign='center';
  ctx.fillText('Time',axX[0]+16,axX[1]+4);
  ctx.fillText('t = 0',origin[0]-20,origin[1]+4);

  // Projected curves
  const meetPink2D  = projectAll(meetPink3D);
  const meetBlue2D  = projectAll(meetBlue3D);
  const miss1Pink2D = projectAll(miss1Pink3D);
  const miss1Blue2D = projectAll(miss1Blue3D);
  const miss2Pink2D = projectAll(miss2Pink3D);
  const miss2Blue2D = projectAll(miss2Blue3D);
  const meetAsym2D  = projectAll(meetAsymPts);
  const miss1Asym2D = projectAll(miss1AsymPts);
  const miss2Asym2D = projectAll(miss2AsymPts);

  const meetPinkPre = meetPink2D.slice(0,mIdx+1).concat([project([meetFrac,meetAsym(meetFrac),0])]);
  const meetBluePre = meetBlue2D.slice(0,mIdx+1).concat([project([meetFrac,meetAsym(meetFrac),0])]);
  const meetAsymPre = meetAsym2D.slice(0,mIdx+1);
  const mergedPts   = meetAsym2D.slice(mIdx);

  const colMix=lerpHex(c1(),c2(),0.5);
  const asymMeetCol =dark?'rgba(255,180,255,0.50)':'rgba(140,0,140,0.32)';
  const asymMiss1Col=dark?'rgba(120,180,255,0.50)':'rgba(0,60,180,0.30)';
  const asymMiss2Col=dark?'rgba(120,220,200,0.50)':'rgba(0,120,100,0.30)';

  if(isMeet){
    polyline(miss1Pink2D,c1(),1.2,ghostCurve);
    polyline(miss1Blue2D,c2(),1.2,ghostCurve);
    polyline(miss2Pink2D,c1(),1.2,ghostCurve);
    polyline(miss2Blue2D,c2(),1.2,ghostCurve);
    polyline(meetAsymPre,asymMeetCol,1,1,[5,9]);
    polyline(meetPinkPre,c1(),2.2,1);
    polyline(meetBluePre,c2(),2.2,1);
    polyline(mergedPts,colMix,2.5,1);
    const dot=project([meetFrac,meetAsym(meetFrac),0]);
    ctx.beginPath(); ctx.arc(dot[0],dot[1],4.5,0,Math.PI*2);
    ctx.fillStyle=colMix; ctx.fill();
    ctx.save(); ctx.globalAlpha=0.7;
    ctx.fillStyle=dark?'rgba(255,150,255,0.9)':'rgba(160,0,160,0.65)';
    ctx.font='10px -apple-system,BlinkMacSystemFont,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('They meet',dot[0],dot[1]-11);
    ctx.restore();
  } else if(isMiss1){
    polyline(meetPinkPre,c1(),1.2,ghostCurve);
    polyline(meetBluePre,c2(),1.2,ghostCurve);
    polyline(mergedPts,colMix,1.2,ghostCurve);
    polyline(miss2Pink2D,c1(),1.2,ghostCurve);
    polyline(miss2Blue2D,c2(),1.2,ghostCurve);
    polyline(miss1Asym2D,asymMiss1Col,1,1,[5,9]);
    polyline(miss1Pink2D,c1(),2.2,1);
    polyline(miss1Blue2D,c2(),2.2,1);
  } else {
    polyline(meetPinkPre,c1(),1.2,ghostCurve);
    polyline(meetBluePre,c2(),1.2,ghostCurve);
    polyline(mergedPts,colMix,1.2,ghostCurve);
    polyline(miss1Pink2D,c1(),1.2,ghostCurve);
    polyline(miss1Blue2D,c2(),1.2,ghostCurve);
    polyline(miss2Asym2D,asymMiss2Col,1,1,[5,9]);
    polyline(miss2Pink2D,c1(),2.2,1);
    polyline(miss2Blue2D,c2(),2.2,1);
  }
}

canvas.addEventListener('mousedown',e=>{dragging=true;lastMX=e.clientX;lastMY=e.clientY;});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  rotY+=(e.clientX-lastMX)*0.008;
  rotX+=(e.clientY-lastMY)*0.008;
  rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
  lastMX=e.clientX;lastMY=e.clientY;
  draw();
});
window.addEventListener('mouseup',()=>{dragging=false;});
canvas.addEventListener('touchstart',e=>{dragging=true;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchmove',e=>{
  if(!dragging)return;
  rotY+=(e.touches[0].clientX-lastMX)*0.008;
  rotX+=(e.touches[0].clientY-lastMY)*0.008;
  rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
  lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;
  draw();
},{passive:true});
window.addEventListener('touchend',()=>dragging=false);

document.getElementById('btn-meet').addEventListener('click',()=>{
  active='meet';
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-meet').classList.add('active');
  draw();
});
document.getElementById('btn-miss1').addEventListener('click',()=>{
  active='miss1';
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-miss1').classList.add('active');
  draw();
});
document.getElementById('btn-miss2').addEventListener('click',()=>{
  active='miss2';
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-miss2').classList.add('active');
  draw();
});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',draw);
draw();
</script>
