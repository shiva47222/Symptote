<!DOCTYPE html>
<html lang="en" style="background: transparent; margin: 0; padding: 0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Symptote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .sw {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 0 1rem;
      gap: 16px;
    }
    canvas#sym {
      display: block;
      width: 100%;
      max-width: 1440px;
      touch-action: none;
    }
    .hint { font-size: 11px; color: #aaa; }
  </style>
</head>
<body>

<div class="sw">
  <canvas id="sym"></canvas>
  <div class="hint">Drag to rotate · tap to change story</div>
</div>

<script>
const canvas = document.getElementById('sym');
const ctx = canvas.getContext('2d');

const W = 1440, H = 1000;
canvas.width = W; canvas.height = H;

/* ---------------- existing helpers unchanged ---------------- */

function seededRand(seed, idx){
  let x = Math.sin(seed*9301 + idx*49297 + 233)*93177;
  return x - Math.floor(x);
}

const TOTAL_CASES = 50;

/* ---------------- NEW: 50 radial time axes ---------------- */

const axes = Array.from({length: TOTAL_CASES}, (_,i)=>{
  const phi = Math.acos(1 - 2*(i+0.5)/TOTAL_CASES);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;

  return [
    Math.sin(phi)*Math.cos(theta),
    Math.sin(phi)*Math.sin(theta),
    Math.cos(phi)
  ];
});

/* ---------------- case system ---------------- */

let currentCase = Math.floor(Math.random()*TOTAL_CASES);

/* ---------------- projection system updated ---------------- */

let rotX=0.38, rotY=-0.55;
const cx=W/2, cy=H/2+10;

function rotate([x,y,z]){
  const cY=Math.cos(rotY), sY=Math.sin(rotY);
  const x1=x*cY+z*sY, z1=-x*sY+z*cY;

  const cX=Math.cos(rotX), sX=Math.sin(rotX);
  return [x1, y*cX-z1*sX, y*sX+z1*cX];
}

function project(pt){
  const [x,y,z]=rotate(pt);
  const sc=360, fov=840;
  const d=fov/(fov+z*sc*0.5+sc*0.8);
  return [cx+x*sc*d, cy-y*sc*d];
}

/* ---------------- KEY CHANGE: axis-based embedding ---------------- */

function embed(axis, t, y){
  return [
    axis[0] * t,
    axis[1] * t + y*0.6,
    axis[2] * t
  ];
}

/* ---------------- your original math preserved ---------------- */

function missAsymVal(ci, t){
  const s = (idx) => seededRand(ci+7, idx);
  const type = Math.floor(s(0)*3);
  if(type===0) return 0.5 - 1.1/(1+Math.exp(-14*(t-(0.25+s(1)*0.25))));
  if(type===1) return (-0.15+s(2)*0.1) + (0.3+s(3)*0.2)*Math.exp(-5*t)*Math.sin(t*(15+s(4)*8));
  return (-0.35+s(5)*0.2) + (0.7+s(6)*0.4)*(t<0.45 ? t/0.45 : 1-(t-0.45)/0.55);
}

function meetAsym(t){
  return 0.18*Math.sin(t*Math.PI)*0.5 + 0.06*t - 0.04;
}

/* ---------------- simple curve generator (axis aware) ---------------- */

function curveForCase(ci, isPink){
  const axis = axes[ci];
  const pts = [];

  for(let i=0;i<=300;i++){
    const t = i/300;

    let y;
    if(ci === 0){
      // meet case
      const asym = meetAsym(t);
      y = asym + (isPink ? 0.4 : -0.4) * (1-t);
      if(t>0.63) y = asym;
    } else {
      const asym = missAsymVal(ci-1, t);
      y = asym + (isPink ? 0.6 : -0.6) * (1/(1+t*8));
    }

    pts.push(project(embed(axis, t, y)));
  }

  return pts;
}

/* ---------------- rendering ---------------- */

function draw(){
  ctx.clearRect(0,0,W,H);

  const isMeet = currentCase === 0;

  /* -------- draw ALL ghost cases -------- */

  for(let ci=0; ci<TOTAL_CASES; ci++){
    if(ci === currentCase) continue;

    const p = curveForCase(ci, true);
    const b = curveForCase(ci, false);

    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = '#cc00aa';
    ctx.beginPath();
    p.forEach((pt,i)=> i?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));
    ctx.stroke();

    ctx.strokeStyle = '#0055cc';
    ctx.beginPath();
    b.forEach((pt,i)=> i?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));
    ctx.stroke();
  }

  /* -------- active case -------- */

  const p = curveForCase(currentCase, true);
  const b = curveForCase(currentCase, false);

  ctx.globalAlpha = 1;

  ctx.strokeStyle = '#cc00aa';
  ctx.lineWidth = 3;
  ctx.beginPath();
  p.forEach((pt,i)=> i?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));
  ctx.stroke();

  ctx.strokeStyle = '#0055cc';
  ctx.beginPath();
  b.forEach((pt,i)=> i?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));
  ctx.stroke();

  /* -------- meet label -------- */

  if(isMeet){
    const mid = p[Math.floor(p.length*0.63)];
    ctx.fillStyle = 'purple';
    ctx.beginPath();
    ctx.arc(mid[0],mid[1],6,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'rgba(120,0,120,0.8)';
    ctx.font = '18px -apple-system';
    ctx.fillText("They meet", mid[0]+10, mid[1]-10);
  }
}

/* ---------------- interaction ---------------- */

canvas.addEventListener('mousedown', e=>{
  currentCase = Math.floor(Math.random()*TOTAL_CASES);
  draw();
});

canvas.addEventListener('touchstart', e=>{
  currentCase = Math.floor(Math.random()*TOTAL_CASES);
  draw();
},{passive:false});

draw();
</script>

</body>
</html>
